stages:
  - lint
  - test
  - build
  - security_scan
  - deploy

variables:
  APP_NAME: "demo-app"

before_script:
  # 顯示目前 pipeline 分支
  - echo "目前分支: $CI_COMMIT_REF_NAME"

lint:
  stage: lint
  image: node:20
  script:
    # 安裝套件
    - npm install
    # 檢查程式碼格式與語法
    - npm run lint
  only:
    - develop
    - main

test:
  stage: test
  image: node:20
  script:
    - npm install
    # 執行單元測試
    - npm run test
  only:
    - develop
    - main

build:
  stage: build
  image: node:20
  script:
    - npm install
    # 建置專案
    - npm run build
  artifacts:
    paths:
      - dist/
  only:
    - develop
    - main

security_scan:
  stage: security_scan
  image: node:20
  script:
    # 檢查 npm 套件是否有安全漏洞
    - npm audit --audit-level=high
  allow_failure: true
  only:
    - develop
    - main

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    # 安裝 ssh / rsync
    - apk add --no-cache openssh rsync
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
  script:
    # 建立遠端目錄
    - ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "mkdir -p /var/www/$APP_NAME"
    # 上傳 build 結果
    - rsync -avz --delete ./dist/ $DEPLOY_USER@$DEPLOY_HOST:/var/www/$APP_NAME/
    # 重啟服務
    - ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "sudo systemctl restart $APP_NAME"
  only:
    - main